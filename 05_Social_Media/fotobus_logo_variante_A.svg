<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2600 408" width="2600" height="408">
  <!-- Variante A: Schwester-Marke, identisches Symbol, Wortmarke fotobus.saarland -->
  <!-- Farben: #E30613 (Rot), #3C3C3C (Dunkelgrau) -->

  <!-- Rotes Quadrat (Symbolbox) -->
  <rect x="100" y="20" width="368" height="368" fill="#E30613"/>

  <!-- FB-Monogramm im Quadrat (vereinfachte Nachzeichnung) -->
  <!-- F-Element (linker Strich) -->
  <rect x="158" y="78" width="48" height="252" fill="#3C3C3C"/>
  <rect x="158" y="78" width="120" height="40" fill="#3C3C3C"/>
  <rect x="158" y="178" width="100" height="36" fill="#3C3C3C"/>

  <!-- B-Element (rechte Hälfte) -->
  <path d="M 290 78 L 290 330 L 380 330 Q 430 330 430 280 Q 430 240 400 220 Q 430 200 430 165 Q 430 118 390 118 L 290 118 Z" fill="#3C3C3C" stroke="none"/>
  <!-- Innenstanzen für die Bögen des B -->
  <path d="M 330 130 L 330 200 L 380 200 Q 400 200 400 168 Q 400 130 380 130 Z" fill="#E30613"/>
  <path d="M 330 230 L 330 312 L 380 312 Q 410 312 410 278 Q 410 230 380 230 Z" fill="#E30613"/>

  <!-- Wortmarke: FOTOBUS -->
  <!-- "FOTOBU" in Dunkelgrau, "S" in Rot -->
  <g font-family="Helvetica, Arial, sans-serif" font-weight="900" font-size="280" letter-spacing="-2">
    <text x="540" y="245" fill="#3C3C3C" font-stretch="ultra-condensed">FOTOBU</text>
    <text x="2160" y="245" fill="#E30613" font-stretch="ultra-condensed">S</text>
  </g>

  <!-- Roter Unterstrich -->
  <rect x="540" y="285" width="1820" height="20" fill="#E30613"/>

  <!-- URL -->
  <text x="2370" y="375" fill="#3C3C3C" font-family="Helvetica, Arial, sans-serif" font-weight="500" font-size="58" text-anchor="end">www.fotobus.saarland</text>
</svg>
