  <ellipse cx="284" cy="22" rx="38" ry="14" fill="#88AAEE" opacity="0.7"/>
  <!-- Lichtblitze -->
  <line x1="234" y1="20" x2="214" y2="10" stroke="#FFD700" stroke-width="4"/>
  <line x1="334" y1="20" x2="354" y2="10" stroke="#FFD700" stroke-width="4"/>

  <!-- Rotes Quadrat (Symbolbox) -->
  <rect x="100" y="62" width="368" height="368" fill="#E30613"/>

  <!-- FB-Monogramm im Quadrat -->
  <rect x="158" y="120" width="48" height="252" fill="#3C3C3C"/>
  <rect x="158" y="120" width="120" height="40" fill="#3C3C3C"/>
  <rect x="158" y="220" width="100" height="36" fill="#3C3C3C"/>

  <path d="M 290 120 L 290 372 L 380 372 Q 430 372 430 322 Q 430 282 400 262 Q 430 242 430 207 Q 430 160 390 160 L 290 160 Z" fill="#3C3C3C"/>
  <path d="M 330 172 L 330 242 L 380 242 Q 400 242 400 210 Q 400 172 380 172 Z" fill="#E30613"/>
  <path d="M 330 272 L 330 354 L 380 354 Q 410 354 410 320 Q 410 272 380 272 Z" fill="#E30613"/>

